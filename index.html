<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>华容道</title>

    <style>
      body {
        background: #e6e3dc;
        color: #222;
        text-align: center;
        font-family: sans-serif;
      }

      #outer {
        position: relative;
        width: 432px; /* 400 + 16边框 */
        height: 532px;
        margin: 30px auto;
        background: #5a2a2a;
        border: 8px solid #3b1a1a;
        box-sizing: border-box;
      }

      /* 底部出口 */
      #outer::after {
        content: "";
        position: absolute;
        bottom: -8px;
        left: 116px; /* (400 - 200)/2 */
        width: 200px;
        height: 16px;
        background: #e6e3dc;
      }

      #board {
        position: absolute;
        top: 8px;
        left: 8px;
        width: 400px;
        height: 500px;
        background: rgb(25, 5, 5);
        touch-action: none;
      }

      .block {
        position: absolute;
        border-radius: 6px;
        border: 2px solid #222;
        background-size: cover;
        background-position: center;
        transition:
          left 0.15s ease,
          top 0.15s ease;
        cursor: pointer;
        user-select: none;
        box-sizing: border-box;
      }

      #controls {
        margin-top: 10px;
      }

      button {
        padding: 6px 12px;
        margin: 0 5px;
        background: #5a2a2a;
        color: white;
        border: none;
        border-radius: 4px;
        cursor: pointer;
      }

      button:hover {
        background: #7a3a3a;
      }
    </style>
  </head>
  <body>
    <h2>华容道</h2>
    <div>步数: <span id="steps">0</span></div>
    <div id="outer">
      <div id="board"></div>
    </div>

    <div id="controls">
      <button onclick="undo()">回退</button>
      <button onclick="resetGame()">重置</button>
    </div>

    <script>
      const CELL = Math.min(window.innerWidth / 4, 100);
      const COLS = 4;
      const ROWS = 5;
      const boardDiv = document.getElementById("board");

      let history = [];
      let steps = 0;
      let currentOpBlock = null;
      let board = [];
      let blockElements = {};

      let blocks = [
        {
          id: "zf",
          name: "张飞",
          shape: [[1], [1]],
          x: 0,
          y: 0,
          img: "./images/zhangfei.jpg",
        },
        {
          id: "zy",
          name: "赵云",
          shape: [[1], [1]],
          x: 3,
          y: 0,
          img: "./images/zhaoyun.jpg",
        },
        {
          id: "mc",
          name: "马超",
          shape: [[1], [1]],
          x: 0,
          y: 2,
          img: "./images/machao.jpg",
        },
        {
          id: "hz",
          name: "黄忠",
          shape: [[1], [1]],
          x: 3,
          y: 2,
          img: "./images/huangzhong.jpg",
        },
        {
          id: "gy",
          name: "关羽",
          shape: [[1, 1]],
          x: 1,
          y: 2,
          img: "./images/guanyu.jpg",
        },
        {
          id: "cc",
          name: "曹操",
          shape: [
            [1, 1],
            [1, 1],
          ],
          x: 1,
          y: 0,
          img: "./images/caocao.jpg",
        },
        {
          id: "b1",
          name: "兵",
          shape: [[1]],
          x: 1,
          y: 3,
          img: "./images/bing6.jpg",
        },
        {
          id: "b2",
          name: "兵",
          shape: [[1]],
          x: 2,
          y: 3,
          img: "./images/bing7.jpg",
        },
        {
          id: "b3",
          name: "兵",
          shape: [[1]],
          x: 0,
          y: 4,
          img: "./images/bing8.jpg",
        },
        {
          id: "b4",
          name: "兵",
          shape: [[1]],
          x: 3,
          y: 4,
          img: "./images/bing9.jpg",
        },
      ];

      function initBoard() {
        board = Array.from({ length: ROWS }, () => Array(COLS).fill(0));
        blocks.forEach((b) => {
          for (let r = 0; r < b.shape.length; r++) {
            for (let c = 0; c < b.shape[0].length; c++) {
              if (b.shape[r][c] === 1) {
                board[b.y + r][b.x + c] = b.id;
              }
            }
          }
        });
      }

      function render() {
        boardDiv.innerHTML = "";
        blockElements = {};

        blocks.forEach((b) => {
          const div = document.createElement("div");
          div.className = "block";
          div.style.width = b.shape[0].length * CELL + "px";
          div.style.height = b.shape.length * CELL + "px";
          div.style.left = b.x * CELL + "px";
          div.style.top = b.y * CELL + "px";
          div.style.backgroundImage = `url(${b.img})`;
          div.title = b.name;
          div.dataset.id = b.id;

          boardDiv.appendChild(div);
          blockElements[b.id] = div;
        });

        document.getElementById("steps").innerText = steps;
      }

      function canMove(block, dx, dy) {
        for (let r = 0; r < block.shape.length; r++) {
          for (let c = 0; c < block.shape[0].length; c++) {
            if (block.shape[r][c] === 1) {
              let nx = block.x + c + dx;
              let ny = block.y + r + dy;
              if (nx < 0 || nx >= COLS || ny < 0 || ny >= ROWS) return false;
              if (board[ny][nx] !== 0 && board[ny][nx] !== block.id)
                return false;
            }
          }
        }
        return true;
      }

      function maxMove(block, dirX, dirY) {
        let count = 0;
        while (canMove(block, dirX * (count + 1), dirY * (count + 1))) {
          count++;
        }
        return count;
      }

      function moveBlock(block, dx, dy) {
        for (let r = 0; r < block.shape.length; r++) {
          for (let c = 0; c < block.shape[0].length; c++) {
            if (block.shape[r][c] === 1) {
              board[block.y + r][block.x + c] = 0;
            }
          }
        }

        block.x += dx;
        block.y += dy;

        for (let r = 0; r < block.shape.length; r++) {
          for (let c = 0; c < block.shape[0].length; c++) {
            if (block.shape[r][c] === 1) {
              board[block.y + r][block.x + c] = block.id;
            }
          }
        }
      }

      let dragging = null;
      let startX, startY;
      let moveAxis = null;
      let maxPixels = 0;

      boardDiv.addEventListener("pointerdown", (e) => {
        const id = e.target.dataset.id;
        if (!id) return;
        
        dragging = blocks.find((b) => b.id === id);
        startX = e.clientX;
        startY = e.clientY;
        moveAxis = null;

        let el = blockElements[id];
        el.style.transition = "none";
        boardDiv.setPointerCapture(e.pointerId);
      });

      document.addEventListener("pointermove", (e) => {
        if (!dragging) return;

        let dx = e.clientX - startX;
        let dy = e.clientY - startY;

        moveAxis = Math.abs(dx) > Math.abs(dy) ? "x" : "y";
        let dirX = moveAxis === "x" ? (dx > 0 ? 1 : -1) : 0;
        let dirY = moveAxis === "y" ? (dy > 0 ? 1 : -1) : 0;
        let maxCells = maxMove(dragging, dirX, dirY);
        maxPixels = maxCells * CELL;

        let el = blockElements[dragging.id];

        if (moveAxis === "x") {
          let limited = Math.max(-maxPixels, Math.min(maxPixels, dx));
          el.style.left = dragging.x * CELL + limited + "px";
        } else {
          let limited = Math.max(-maxPixels, Math.min(maxPixels, dy));
          el.style.top = dragging.y * CELL + limited + "px";
        }
      });

      document.addEventListener("pointerup", (e) => {
        if (!dragging) return;

        let el = blockElements[dragging.id];
        el.style.transition = "left 0.15s ease, top 0.15s ease";

        let dx = e.clientX - startX;
        let dy = e.clientY - startY;

        let dirX = 0, dirY = 0;

        if (moveAxis === "x") {
          dirX = dx > 0 ? 1 : -1;
        } else {
          dirY = dy > 0 ? 1 : -1;
        }

        let maxCells = maxMove(dragging, dirX, dirY);
        let moveCells = Math.round(Math.abs(moveAxis === "x" ? dx : dy) / CELL);
        moveCells = Math.min(moveCells, maxCells);

        if (moveCells > 0) {
          moveBlock(dragging, dirX * moveCells, dirY * moveCells);

          if (currentOpBlock !== dragging.id) {
            steps++;
            currentOpBlock = dragging.id;
          }

          saveState();
          checkWin();
        }

        dragging = null;
        moveAxis = null;

        render();
      });

      function checkWin() {
        let cc = blocks.find((b) => b.id === "cc");
        if (cc.x === 1 && cc.y === 3) {
          setTimeout(() => {
            alert("胜利！共 " + steps + " 步");
          }, 200);
        }
      }

      function saveState() {
        history.push(JSON.stringify({ blocks, steps, currentOpBlock }));
        localStorage.setItem("hrd", history[history.length - 1]);
      }

      function undo() {
        if (history.length < 2) return;
        history.pop();
        let state = JSON.parse(history[history.length - 1]);
        blocks = state.blocks;
        steps = state.steps;
        currentOpBlock = state.currentOpBlock;
        initBoard();
        render();
      }

      function resetGame() {
        localStorage.removeItem("hrd");
        location.reload();
      }

      function load() {
        let data = localStorage.getItem("hrd");
        if (data) {
          let state = JSON.parse(data);
          blocks = state.blocks;
          steps = state.steps;
          currentOpBlock = state.currentOpBlock;
        }
        initBoard();
        render();
        saveState();
      }

      load();
    </script>
  </body>
</html>
