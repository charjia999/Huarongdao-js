<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>华容道</title>

    <style>
      body {
        background: #e6e3dc;
        color: #222;
        text-align: center;
        font-family: sans-serif;
        margin: 0;
        user-select: none;
        overflow-x: hidden;
      }

      /* ===== Game frame ===== */

      #outer {
        position: relative;

        /* responsive width */
        width: 100%;
        max-width: 432px;

        /* maintain original aspect ratio */
        aspect-ratio: 432 / 532;

        margin: 12px auto;

        background: #5a2a2a;
        border: 8px solid #3b1a1a;
        box-sizing: border-box;
      }

      /* ===== Exit opening ===== */

      #outer::after {
        content: "";
        position: absolute;

        bottom: -8px;

        /* centered exit */
        left: calc(50% - 23%);
        width: 46%;

        height: 16px;

        background: #e6e3dc;
      }

      /* ===== Board ===== */

      #board {
        position: absolute;

        top: 8px;
        left: 8px;

        /* fill inside frame */
        width: calc(100% - 16px);
        height: calc(100% - 16px);

        background: rgb(25, 5, 5);

        /* important for mobile dragging */
        touch-action: none;
      }

      /* ===== Blocks ===== */

      .block {
        position: absolute;
        border-radius: 6px;
        border: 2px solid #222;
        overflow: hidden;

        transition:
          left 0.15s ease,
          top 0.15s ease;

        cursor: pointer;
        box-sizing: border-box;
      }

      .block img {
        position: absolute;
        object-fit: cover;
      }

      /* subtle hover feedback for desktop */

      .block:hover {
        transform: scale(1.03);
      }

      /* ===== Controls ===== */

      #controls {
        margin-top: 12px;
      }

      /* ===== Buttons ===== */

      button {
        padding: 8px 14px;
        margin: 0 6px;

        background: #5a2a2a;
        color: white;

        border: none;
        border-radius: 6px;

        font-size: 15px;

        cursor: pointer;
      }

      button:hover {
        background: #7a3a3a;
      }

      /* ===== Mobile adjustments ===== */

      @media (max-width: 480px) {
        h2 {
          font-size: 20px;
          margin-top: 10px;
        }

        button {
          padding: 10px 16px;
          font-size: 16px;
        }
      }

      #levelSelect {
        position: fixed;
        inset: 0;

        background: rgba(0, 0, 0, 0.7);

        display: none;
        justify-content: center;
        align-items: center;
      }

      #levelImage {
        width: 90%;
        max-width: 548px;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <h2>华容道</h2>
    <div>步数: <span id="steps">0</span></div>
    <div id="outer">
      <div id="board"></div>
    </div>

    <div id="controls">
      <button onclick="undo()">回退</button>
      <button onclick="resetGame()">重置</button>
      <button onclick="openLevelSelect()">选关</button>
    </div>

    <div id="levelSelect">
      <img src="./images/levels.png" id="levelImage" />
    </div>

    <script src="./levels.js"></script>
    <script>
      let CELL;
      const COLS = 4;
      const ROWS = 5;
      const boardDiv = document.getElementById("board");

      let board = [];
      let blockElements = {};

      let currentLevel = 0;
      let currentOpBlock = null;
      let moveHistory = [];
      let steps = 0;

      function updateCell() {
        CELL = boardDiv.clientWidth / COLS;
      }

      function initBoard() {
        board = Array.from({ length: ROWS }, () => Array(COLS).fill(0));
        blocks.forEach((b) => {
          for (let r = 0; r < b.shape.length; r++) {
            for (let c = 0; c < b.shape[0].length; c++) {
              if (b.shape[r][c] === 1) {
                board[b.y + r][b.x + c] = b.id;
              }
            }
          }
        });
      }

      function render() {
        updateCell();

        boardDiv.innerHTML = "";
        blockElements = {};

        blocks.forEach((b) => {
          const div = document.createElement("div");
          div.className = "block";
          div.style.width = b.shape[0].length * CELL + "px";
          div.style.height = b.shape.length * CELL + "px";
          div.style.left = b.x * CELL + "px";
          div.style.top = b.y * CELL + "px";
          const img = document.createElement("img");
          img.src = b.img;

          img.style.pointerEvents = "none";
          img.style.position = "absolute";

          const rot = b.rot || 0;

          img.style.left = "50%";
          img.style.top = "50%";
          img.style.transformOrigin = "center";

          /* parent block size */
          const w = b.shape[0].length * CELL;
          const h = b.shape.length * CELL;

          /* simulate rotate-first */
          if (rot % 180 !== 0) {
            img.style.width = h + "px";
            img.style.height = w + "px";
          } else {
            img.style.width = w + "px";
            img.style.height = h + "px";
          }

          img.style.transform = `translate(-50%, -50%) rotate(${rot}deg)`;

          div.appendChild(img);

          div.title = b.name;
          div.dataset.id = b.id;
          boardDiv.appendChild(div);
          blockElements[b.id] = div;
        });

        document.getElementById("steps").innerText = steps;
      }

      function openLevelSelect() {
        document.getElementById("levelSelect").style.display = "flex";
      }

      function loadLevel(index) {
        currentLevel = index;
        blocks = structuredClone(LEVELS[index]);

        currentOpBlock = null;
        moveHistory = [];
        steps = 0;

        let data = localStorage.getItem("hrd");
        if (data) {
          let state = JSON.parse(data);
          blocks = state.blocks;
          steps = state.steps;
          currentOpBlock = state.currentOpBlock;
          currentLevel = state.currentLevel;
        }

        initBoard();
        render();
        saveState();
      }

      const img = document.getElementById("levelImage");

      img.addEventListener("click", (e) => {
        const rect = img.getBoundingClientRect();

        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;

        const col = Math.floor(x / (rect.width / 8));
        const row = Math.floor(y / (rect.height / 6));

        const level = row * 8 + col;

        if (level === currentLevel) {
          document.getElementById("levelSelect").style.display = "none";
          return;
        }

        if (level < LEVELS.length) {
          localStorage.removeItem("hrd");
          document.getElementById("levelSelect").style.display = "none";

          loadLevel(level);
        }
      });

      function canMove(block, dx, dy) {
        for (let r = 0; r < block.shape.length; r++) {
          for (let c = 0; c < block.shape[0].length; c++) {
            if (block.shape[r][c] === 1) {
              let nx = block.x + c + dx;
              let ny = block.y + r + dy;
              if (nx < 0 || nx >= COLS || ny < 0 || ny >= ROWS) return false;
              if (board[ny][nx] !== 0 && board[ny][nx] !== block.id)
                return false;
            }
          }
        }
        return true;
      }

      function maxMove(block, dirX, dirY) {
        let count = 0;
        while (canMove(block, dirX * (count + 1), dirY * (count + 1))) {
          count++;
        }
        return count;
      }

      function moveBlock(block, dx, dy) {
        for (let r = 0; r < block.shape.length; r++) {
          for (let c = 0; c < block.shape[0].length; c++) {
            if (block.shape[r][c] === 1) {
              board[block.y + r][block.x + c] = 0;
            }
          }
        }

        block.x += dx;
        block.y += dy;

        for (let r = 0; r < block.shape.length; r++) {
          for (let c = 0; c < block.shape[0].length; c++) {
            if (block.shape[r][c] === 1) {
              board[block.y + r][block.x + c] = block.id;
            }
          }
        }
      }

      let dragging = null;
      let startX, startY;
      let moveAxis = null;
      let maxPixels = 0;

      window.addEventListener("resize", () => {
        render();
      });

      boardDiv.addEventListener("pointerdown", (e) => {
        const id = e.target.dataset.id;
        if (!id) return;

        dragging = blocks.find((b) => b.id === id);
        startX = e.clientX;
        startY = e.clientY;
        moveAxis = null;

        let el = blockElements[id];
        el.style.transition = "none";
        boardDiv.setPointerCapture(e.pointerId);
      });

      document.addEventListener("pointermove", (e) => {
        if (!dragging) return;

        let dx = e.clientX - startX;
        let dy = e.clientY - startY;

        moveAxis = Math.abs(dx) > Math.abs(dy) ? "x" : "y";
        let dirX = moveAxis === "x" ? (dx > 0 ? 1 : -1) : 0;
        let dirY = moveAxis === "y" ? (dy > 0 ? 1 : -1) : 0;
        let maxCells = maxMove(dragging, dirX, dirY);
        maxPixels = maxCells * CELL;

        let el = blockElements[dragging.id];

        if (moveAxis === "x") {
          let limited = Math.max(-maxPixels, Math.min(maxPixels, dx));
          el.style.left = dragging.x * CELL + limited + "px";
        } else {
          let limited = Math.max(-maxPixels, Math.min(maxPixels, dy));
          el.style.top = dragging.y * CELL + limited + "px";
        }
      });

      document.addEventListener("pointerup", (e) => {
        if (!dragging) return;

        let el = blockElements[dragging.id];
        el.style.transition = "left 0.15s ease, top 0.15s ease";

        let dx = e.clientX - startX;
        let dy = e.clientY - startY;

        let dirX = 0,
          dirY = 0;

        if (moveAxis === "x") {
          dirX = dx > 0 ? 1 : -1;
        } else {
          dirY = dy > 0 ? 1 : -1;
        }

        let maxCells = maxMove(dragging, dirX, dirY);
        let moveCells = Math.round(Math.abs(moveAxis === "x" ? dx : dy) / CELL);
        moveCells = Math.min(moveCells, maxCells);

        if (moveCells > 0) {
          moveBlock(dragging, dirX * moveCells, dirY * moveCells);

          if (currentOpBlock !== dragging.id) {
            steps++;
            currentOpBlock = dragging.id;
          }

          saveState();
          checkWin();
        }

        dragging = null;
        moveAxis = null;

        render();
      });

      function checkWin() {
        let cc = blocks.find((b) => b.id === "cc");
        if (cc.x === 1 && cc.y === 3) {
          setTimeout(() => {
            alert("胜利！共 " + steps + " 步");
          }, 200);
        }
      }

      function saveState() {
        moveHistory.push(
          JSON.stringify({ blocks, steps, currentOpBlock, currentLevel }),
        );
        localStorage.setItem("hrd", moveHistory[moveHistory.length - 1]);
      }

      function undo() {
        if (moveHistory.length < 2) return;
        moveHistory.pop();
        let state = JSON.parse(moveHistory[moveHistory.length - 1]);
        blocks = state.blocks;
        steps = state.steps;
        currentOpBlock = state.currentOpBlock;
        initBoard();
        render();
      }

      function resetGame() {
        localStorage.removeItem("hrd");
        loadLevel(currentLevel);
      }

      loadLevel(currentLevel);
    </script>
  </body>
</html>
